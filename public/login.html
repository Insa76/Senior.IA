<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso</title>

  <style>
body {
  font-family: Arial;
  background: #f2f4f8;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  padding: 20px;
  margin: 0;
}

.container {
  width: 100%;
  max-width: 400px;
}

h1 {
  text-align: center;
  font-size: 28px;
}

input {
  width: 100%;
  padding: 18px;
  font-size: 20px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 18px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  cursor: pointer;
}

#enterBtn {
  background: #4a90e2;
  color: white;
}

#generateBtn {
  background: #6c757d;
  color: white;
}

#copyBtn {
  background: #28a745;
  color: white;
}

#generatedId, #familyLink {
  margin-top: 10px;
  font-size: 16px;
  word-break: break-word;
}
</style>
</head>

<body>

<div class="container">

<h1>Ingresar</h1>

<input id="userId" placeholder="Nombre del usuario (ej: juan)" />

<button id="generateBtn" onclick="generateUser()">Generar usuario</button>

<div id="generatedId"></div>
<div id="familyLink"></div>

<button id="copyBtn" onclick="copyLink()">Copiar link familiar</button>

<button id="enterBtn" onclick="login()">Entrar</button>

</div>

<script>

function login() {
  const userId = document.getElementById("userId").value.trim();

  if (!userId) {
    alert("Ingresá un nombre");
    return;
  }

  // 👉 esto es lo correcto
  window.location.href = `/?userId=${userId}`;
}

function generateUser() {
  const id = "user-" + Math.floor(Math.random() * 100000);

  document.getElementById("userId").value = id;

  document.getElementById("generatedId").innerText =
    "ID generado: " + id;
}

function goFamily() {
  const userId = document.getElementById("userId").value.trim();
  if (!userId) return alert("Ingresá un nombre");

  window.location.href = `/family.html?userId=${userId}`;
}
</script>

</body>
</html>
