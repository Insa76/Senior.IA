<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Panel Familiar</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f2f4f8;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 12px;
      font-size: 18px;
    }

    .status {
      text-align: center;
      padding: 20px;
      font-size: 24px;
      border-radius: 12px;
      color: white;
    }

    .normal {
      background: #4caf50;
    }

    .atencion {
      background: #ff9800;
    }

    .urgente {
      background: #f44336;
    }
  </style>
</head>

<body>

<h1>👨‍👩‍👧 Panel Familiar</h1>

<div id="statusBox" class="status">Cargando...</div>

<div class="card">
  <strong>Nombre:</strong> <span id="name"></span>
</div>

<div class="card">
  <strong>Estado emocional:</strong> <span id="emotion"></span>
</div>

<div class="card">
  <strong>Última interacción:</strong> <span id="time"></span>
</div>

<div class="card">
  <strong>Le gusta:</strong> <span id="likes"></span>
</div>

<div class="card">
  <strong>Historial reciente:</strong>
  <ul id="history"></ul>
</div>

<div class="card">
  <strong>Estado emocional (últimos registros):</strong>
  <canvas id="chart"></canvas>
</div>

<script>
    let chart; 
async function loadData() { 
  const res = await fetch("/family/web-user");
  const data = await res.json();

  document.getElementById("name").innerText = data.name;
  document.getElementById("emotion").innerText = data.emotion;
  document.getElementById("time").innerText = data.lastInteraction;
  document.getElementById("likes").innerText = data.likes.join(", ");

  const box = document.getElementById("statusBox");

  if (data.status === "normal") {
    box.className = "status normal";
    box.innerText = "🟢 Todo bien";
  }

  if (data.status === "atencion") {
    box.className = "status atencion";
    box.innerText = "🟡 Requiere atención";
  }

  if (data.status === "urgente") {
    box.className = "status urgente";
    box.innerText = "🔴 URGENTE";
  }

  const historyEl = document.getElementById("history");
  historyEl.innerHTML = "";

  (data.history || []).forEach(item => {
    const li = document.createElement("li");
    li.innerText = `${item.emotion} - ${new Date(item.time).toLocaleTimeString()}`;
    historyEl.appendChild(li);
  });

  const labels = data.history.map(item =>
  new Date(item.time).toLocaleTimeString()
);

const values = data.history.map(item => {
  switch (item.emotion) {
    case "feliz": return 4;
    case "neutral": return 3;
    case "aburrido": return 2;
    case "ansioso": return 1;
    case "triste": return 0;
    default: return 2;
  }
});

// destruir gráfico anterior
if (chart) {
  chart.destroy();
}

const ctx = document.getElementById("chart");

chart = new Chart(ctx, {
  type: "line",
  data: {
    labels,
    datasets: [{
      label: "Estado emocional",
      data: values,
      tension: 0.3
    }]
  },
  options: {
    scales: {
      y: {
        ticks: {
          callback: function(value) {
            switch (value) {
              case 4: return "😊";
              case 3: return "😐";
              case 2: return "😶";
              case 1: return "😟";
              case 0: return "😢";
            }
          }
        },
        min: 0,
        max: 4
      }
    }
  }
});
}


setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
